name: APK yasash

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodni olish
        uses: actions/checkout@v4

      - name: APK yasash
        uses: ArtemSBulgakov/buildozer-action@v1
        with:
          command: buildozer android debug

      - name: APK ni saqlash
        uses: actions/upload-artifact@v4
        with:
          name: Markirovka-APK
          path: bin/*.apk
