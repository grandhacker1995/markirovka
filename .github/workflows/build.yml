name: APK yasash

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kodni yuklab olish
        uses: actions/checkout@v4

      - name: Python o'rnatish
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Kerakli paketlar
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool \
            pkg-config zlib1g-dev libncurses-dev cmake libffi-dev libssl-dev

      - name: Buildozer o'rnatish
        run: |
          python -m pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.36

      - name: APK yasash
        run: |
          export BUILDOZER_WARN_ON_ROOT=0
          buildozer android debug

      - name: APK ni saqlash
        uses: actions/upload-artifact@v4
        with:
          name: Markirovka-APK
          path: bin/*.apk
