name: APK yasash

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodni olish
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Tizim paketlari
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk python3-pip autoconf libtool \
            pkg-config zlib1g-dev libncurses-dev cmake libffi-dev libssl-dev \
            libltdl-dev build-essential ccache

      - name: Buildozer va bog'liqliklar
        run: |
          python -m pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.36

      - name: Buildozer cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: buildozer-${{ hashFiles('buildozer.spec') }}

      - name: APK yasash
        run: |
          export BUILDOZER_WARN_ON_ROOT=0
          buildozer android debug 2>&1 | tee build.log

      - name: Xato bo'lsa logni ko'rsatish
        if: failure()
        run: tail -n 80 build.log || true

      - name: APK ni saqlash
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Markirovka-APK
          path: bin/*.apk
